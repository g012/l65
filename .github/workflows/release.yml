name: Draft release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Cross-build and create draft release
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Zig
        shell: bash
        env:
          ZIG_VERSION: 0.15.1
        run: |
          set -euo pipefail
          archive="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          install_dir="${RUNNER_TEMP}/zig-${ZIG_VERSION}"

          curl --fail --location --retry 3 \
            --output "${RUNNER_TEMP}/${archive}" \
            "https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          mkdir -p "${install_dir}"
          tar -xJf "${RUNNER_TEMP}/${archive}" \
            --strip-components=1 \
            -C "${install_dir}"
          "${install_dir}/zig" version
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Cross-build release binaries
        run: zig build release --release=small

      - name: Package release archives
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          for target in \
            x86_64-linux-musl \
            aarch64-linux \
            x86_64-macos.10.7 \
            aarch64-macos.11.0
          do
            tar -czf \
              "${GITHUB_WORKSPACE}/dist/l65-${VERSION}-${target}.tar.gz" \
              -C "zig-out/${target}" .
          done

          for target in x86_64-windows aarch64-windows
          do
            zip -j \
              "dist/l65-${VERSION}-${target}.zip" \
              "zig-out/${target}/l65.exe" \
              "zig-out/${target}/l7801.exe" \
              "zig-out/${target}/lz80.exe"
          done

          cd dist
          sha256sum ./* > SHA256SUMS

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
